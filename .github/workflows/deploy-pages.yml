name: Build and publish site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-site
  cancel-in-progress: false

env:
  TARGET_REPOSITORY: FRIEDparrot/FriedParrot.github.io
  TARGET_BRANCH: main
  BUILD_DIR: docs/.vitepress/dist

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: published-site

      - name: Publish dist to target repository
        run: |
          rsync -a --delete --exclude=".git" "${BUILD_DIR}/" published-site/
          touch published-site/.nojekyll

          cd published-site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No site changes to publish."
          else
            git commit -m "Deploy site from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
            git push origin "${TARGET_BRANCH}"
          fi
