name: Build and publish site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-site
  cancel-in-progress: false

env:
  TARGET_REPOSITORY: FRIEDparrot/FriedParrot.github.io
  TARGET_BRANCH: main
  BUILD_DIR: docs/.vitepress/dist

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Publish to target repository
        env:
          TARGET_REPOSITORY_URL: https://x-access-token:${{ secrets.PAGES_DEPLOY_TOKEN }}@github.com/${{ env.TARGET_REPOSITORY }}.git
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: npm run docs:publish
